<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>근로자 사회보험료 계산기</title>


  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    :root{
      --bg:#ffffff; --text:#111; --muted:#666; --line:#e5e7eb; --soft:#f8fafc;
      --focus:#b4b4d0; --shadow:0 8px 24px rgba(0,0,0,.08); --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", "맑은 고딕", sans-serif;
      line-height:1.5;
    }
    .wrap{ max-width:1180px; margin:0 auto; padding:22px 16px 40px; }
    h1{ margin:6px 0 10px; font-size:1.65rem; text-align:center; }
    .sub{ margin:0 0 16px; text-align:center; color:var(--muted); font-size:.98rem; }

    .panel{
      border:1px solid var(--line); border-radius:var(--radius);
      background:#fff; box-shadow: var(--shadow);
      padding:14px 14px; margin:14px 0;
    }
    .grid{
      display:grid; gap:12px;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items:end;
    }
    .field{ grid-column: span 3; min-width:0; }
    .field.wide{ grid-column: span 12; }
    .field.n2{ grid-column: span 2; }
    .field.n3{ grid-column: span 3; }
    .field.n4{ grid-column: span 4; }
    .field.n6{ grid-column: span 6; }

    .field label{ display:block; font-size:.9rem; color:#222; margin:0 0 6px; font-weight:650; }
    select, input[type="text"]{
      width:100%;
      padding:10px 12px;
      border:1px solid #d9d9e3;
      border-radius:12px;
      background:#f9fafb;
      outline:none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.02);
      font:inherit;
    }
    select:focus, input:focus{
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(180,180,208,.25);
      background:#fff;
    }

    .btnrow{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end; margin-top:10px; }
    button{
      appearance:none;
      border:1px solid #222;
      background:#fff;
      color:#111;
      padding:10px 14px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    button.primary{ background:#111; color:#fff; }
    button.ghost{ background:#f3f4f6; border-color:#d4d4d8; font-weight:650; }
    button:hover{ filter:brightness(0.98); transform: translateY(-1px); }
    button:active{ transform: translateY(0px); }

    .note{ margin-top:10px; font-size:.92rem; color:var(--muted); }
    .ratebox{
      background:var(--soft);
      border:1px dashed #d6dbe6;
      border-radius:12px;
      padding:10px 12px;
      font-size:.92rem;
      color:#333;
    }
    .ratebox code{ font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:.9em; }

    .tablewrap{
      margin-top:12px;
      width:100%;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }
    table{
      border-collapse:collapse;
      min-width: 1280px;
      width:100%;
      font-size:.95rem;
    }
    thead th{
      position:sticky; top:0;
      background:#f9fafb;
      z-index:2;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
      text-align:center;
      padding:10px 8px;
      font-weight:800;
    }
    tbody td, tfoot td{
      border-top:1px solid var(--line);
      padding:8px 8px;
      white-space:nowrap;
      text-align:right;
    }
    tbody tr:nth-child(odd){ background:#fff; }
    tbody tr:nth-child(even){ background:#fcfdff; }
    td.left, th.left{ text-align:left; }
    td.center, th.center{ text-align:center; }
    tfoot td{
      background:#111;
      color:#fff;
      font-weight:800;
      position:sticky;
      bottom:0;
      z-index:1;
    }

    .cell-input{
      background:#fff;
      border:1px solid #d9d9e3;
      border-radius:10px;
      padding:8px 10px;
      text-align:right;
      width:100%;
      min-width: 110px;
    }
    .cell-input.name{ text-align:left; min-width: 120px; }
    .cell-input:focus{
      outline:none;
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(180,180,208,.25);
    }

    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background:#eef2ff;
      border:1px solid #dbe3ff;
      padding:.1em .5em;
      border-radius:999px;
      font-size:.9em;
    }

    .inline-help{ font-size:.86rem; color:#666; margin-top:6px; }
    .hide{ display:none !important; }

    @media (max-width: 980px){
      .field, .field.n2, .field.n3, .field.n4, .field.n6{ grid-column: span 6; }
      .field.wide{ grid-column: span 12; }
      .btnrow{ justify-content:stretch; }
      button{ flex:1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>근로자 사회보험료 계산기</h1>
    <p class="muted">
      ·산재보험요율은 개발자 학교 요율(0.966%)로 기본 세팅해뒀는데 수정 가능합니다. 
    </p>

    <div class="panel">
      <div class="grid">
        <div class="field n2">
          <label for="year">요율 기준연도 선택</label>
          <select id="year">
            <option value="2025">2025년 요율</option>
            <option value="2026" selected>2026년 요율</option>
            <option value="custom">요율 직접 입력</option>
          </select>

        </div>

        <div class="field n2">
          <label for="rateNps">국민연금 총요율(%)</label>
          <input id="rateNps" type="text" inputmode="decimal" />
        </div>

        <div class="field n2">
          <label for="rateHi">건강보험 총요율(%)</label>
          <input id="rateHi" type="text" inputmode="decimal" />
        </div>

        <div class="field n3">
          <label for="rateLtcOfHi">장기요양(건강보험료 대비)(%)</label>
          <input id="rateLtcOfHi" type="text" inputmode="decimal" />
        </div>

        <div class="field n3">
          <label for="rateLtcSalary">장기요양(보수 대비)(%)</label>
          <input id="rateLtcSalary" type="text" inputmode="decimal" />
        </div>

        <div class="field n2">
          <label for="rateEiEmp">고용(실업급여) 근로자(%)</label>
          <input id="rateEiEmp" type="text" inputmode="decimal" />
        </div>

        <div class="field n2">
          <label for="rateEiEr">고용(실업급여) 사업주(%)</label>
          <input id="rateEiEr" type="text" inputmode="decimal" />
        </div>

        <div class="field n3">
          <label for="eiExtra">고용 고안·직능(사업주만)</label>
          <select id="eiExtra">
            <option value="0.0025">0.25% (상시 150인 미만)</option>
            <option value="0.0045">0.45% (150인 이상 우선지원대상)</option>
            <option value="0.0065">0.65% (150~999인, 우선지원 제외)</option>
            <option value="0.0085" selected>0.85% (1000인 이상/국가지자체)</option>
            <option value="custom">직접입력</option>
          </select>
        </div>

        <div class="field n2" id="eiExtraCustomWrap">
          <label for="eiExtraCustom">고안·직능 직접입력(%)</label>
          <input id="eiExtraCustom" type="text" inputmode="decimal" value="0.85" />
        </div>

        <div class="field n2">
          <label for="wcDefault">기본 산재요율(%) (사업주)</label>
          <input id="wcDefault" type="text" inputmode="decimal" value="0.966" />
        </div>

        <div class="field wide">
          <label>현재 적용 요율(자동 요약)</label>
          <div class="ratebox" id="rateSummary"></div>
        </div>
      </div>

      <div class="btnrow">
        <button class="ghost" id="btnClear">입력 지우기</button>
        <button class="ghost" id="btnFillDemo">기본값 채우기</button>
        <button class="primary" id="btnDownloadXls">엑셀(.xls) 다운로드</button>
      </div>

    </div>

    <div class="panel">
      <div class="tablewrap">
        <table id="sheet">
          <thead>
            <tr>
              <th class="center">No</th>
              <th class="left">이름</th>
              <th>보수월액(원)</th>
              <th>산재요율(%)<br/><span style="font-weight:650;color:#666;">(비우면 기본)</span></th>

              <th>국민연금<br/>근로자</th>
              <th>국민연금<br/>사업주</th>

              <th>건강보험<br/>근로자</th>
              <th>건강보험<br/>사업주</th>

              <th>장기요양<br/>근로자</th>
              <th>장기요양<br/>사업주</th>

              <th>고용보험<br/>근로자</th>
              <th>고용보험<br/>사업주</th>

              <th>산재보험<br/>사업주</th>

              <th>합계<br/>근로자</th>
              <th>합계<br/>사업주</th>
              <th>총부담(합)</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
          <tfoot>
            <tr>
              <td class="center" colspan="4">5명 합계</td>
              <td id="sum_nps_e"></td>
              <td id="sum_nps_er"></td>
              <td id="sum_hi_e"></td>
              <td id="sum_hi_er"></td>
              <td id="sum_ltc_e"></td>
              <td id="sum_ltc_er"></td>
              <td id="sum_ei_e"></td>
              <td id="sum_ei_er"></td>
              <td id="sum_wc_er"></td>
              <td id="sum_emp"></td>
              <td id="sum_er"></td>
              <td id="sum_total"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <p class="note" style="text-align:center;">(다운로드 파일은 엑셀에서 바로 열리는 .xls 형식입니다)</p>
  </div>

<script>
(() => {
  // ==============================
  // 0) 기본값(연도 프리셋)
  // ==============================
  const PRESET = {
    "2025": {
      npsPct: 9.0,
      hiPct: 7.09,
      ltcOfHiPct: 12.95, // 장기요양 = 건강보험료 * 12.95%
      eiEmpPct: 0.9,
      eiErPct: 0.9
    },
    "2026": {
      npsPct: 9.5,
      hiPct: 7.19,
      ltcOfHiPct: 13.14, // 보수 대비 0.9448% 수준(7.19 * 13.14 / 100)
      eiEmpPct: 0.9,
      eiErPct: 0.9
    }
  };

  const N = 5; // 인원

  const els = {
    year: document.getElementById("year"),

    rateNps: document.getElementById("rateNps"),
    rateHi: document.getElementById("rateHi"),
    rateLtcOfHi: document.getElementById("rateLtcOfHi"),
    rateLtcSalary: document.getElementById("rateLtcSalary"),
    rateEiEmp: document.getElementById("rateEiEmp"),
    rateEiEr: document.getElementById("rateEiEr"),

    eiExtra: document.getElementById("eiExtra"),
    eiExtraCustomWrap: document.getElementById("eiExtraCustomWrap"),
    eiExtraCustom: document.getElementById("eiExtraCustom"),

    wcDefault: document.getElementById("wcDefault"),

    rateSummary: document.getElementById("rateSummary"),

    tbody: document.getElementById("tbody"),
    btnClear: document.getElementById("btnClear"),
    btnFillDemo: document.getElementById("btnFillDemo"),
    btnDownloadXls: document.getElementById("btnDownloadXls"),
  };

  const sumIds = [
    "sum_nps_e","sum_nps_er","sum_hi_e","sum_hi_er","sum_ltc_e","sum_ltc_er",
    "sum_ei_e","sum_ei_er","sum_wc_er","sum_emp","sum_er","sum_total"
  ].reduce((acc,id)=> (acc[id]=document.getElementById(id), acc), {});

  // 엑셀 다운로드용 상태
  const state = {
    rows: Array.from({length:N}, () => ({})),
    sums: {},
    rates: {}
  };

  // ==============================
  // 1) 유틸
  // ==============================
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const floor10 = (x) => (isFinite(x) ? Math.floor(x/10)*10 : NaN); // 10원 미만 절사

  function fmtWon(n){
    if (!isFinite(n)) return "";
    const s = Math.round(n).toString();
    return s.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function cleanNumberText(s){
    return (s ?? "")
      .toString()
      .replace(/[,\s]/g,"")
      .replace(/원/g,"")
      .trim();
  }

  function parseWon(s){
    const t = cleanNumberText(s);
    if (!t) return NaN;

    let mult = 1;
    let u = t;

    // 아주 가볍게 단위 처리
    if (u.includes("억")) { mult *= 100000000; u = u.replace(/억/g,""); }
    if (u.includes("만")) { mult *= 10000; u = u.replace(/만/g,""); }

    u = u.replace(/[^0-9.]/g,"");
    if (!u) return NaN;
    const num = Number(u);
    if (!isFinite(num)) return NaN;
    return num * mult;
  }

  // "7.19" -> 0.0719 (decimal)
  function parsePercent(s){
    const t = (s ?? "").toString().trim().replace(/[%\s]/g,"");
    if (!t) return NaN;
    const n = Number(t.replace(/,/g,""));
    return isFinite(n) ? (n / 100) : NaN;
  }

  function pctStr(x, digits=4){
    if (!isFinite(x)) return "";
    // x는 "퍼센트 값" (예: 7.19)
    return Number(x).toFixed(digits).replace(/\.?0+$/,"");
  }

  function setInputCommaOnBlur(input, kind){
    input.addEventListener("focus", () => {
      if (kind === "pct"){
        input.value = (input.value ?? "").toString().replace(/[%\s]/g,"").replace(/,/g,"");
      } else {
        input.value = cleanNumberText(input.value);
      }
      setTimeout(() => input.select(), 0);
    });

    input.addEventListener("blur", () => {
      if (!input.value.trim()) return;

      if (kind === "won") {
        const n = parseWon(input.value);
        input.value = isFinite(n) ? fmtWon(n) : input.value;
      } else if (kind === "pct") {
        const p = parsePercent(input.value);
        if (isFinite(p)) {
          // %로 다시 보여주기
          const val = p * 100;
          input.value = Number(val.toFixed(4)).toString();
        }
      }
    });
  }

  function numOr0(x){ return isFinite(x) ? x : 0; }

  // ==============================
  // 2) 장기요양 2칸 자동 연동
  // ==============================
  let ltcSyncLock = false;

  function syncLtc(from){
    if (ltcSyncLock) return;
    ltcSyncLock = true;

    const hi = parsePercent(els.rateHi.value); // decimal
    const ratio = parsePercent(els.rateLtcOfHi.value); // decimal (건보료 대비)
    const total = parsePercent(els.rateLtcSalary.value); // decimal (보수 대비)

    if (from === "hiRatio" || from === "hi"){
      // ratio가 있으면 -> total 갱신
      if (isFinite(hi) && hi > 0 && isFinite(ratio)){
        const salaryPct = hi * ratio * 100; // % 값
        els.rateLtcSalary.value = Number(salaryPct.toFixed(4)).toString();
      }
      // ratio가 없고 total이 있으면 -> ratio 갱신(hi 변경 시)
      else if (from === "hi" && isFinite(hi) && hi > 0 && isFinite(total)){
        const ratioPct = (total / hi) * 100; // % 값
        els.rateLtcOfHi.value = Number(ratioPct.toFixed(4)).toString();
      }
    }

    if (from === "salary"){
      if (isFinite(hi) && hi > 0 && isFinite(total)){
        const ratioPct = (total / hi) * 100; // % 값
        els.rateLtcOfHi.value = Number(ratioPct.toFixed(4)).toString();
      }
    }

    ltcSyncLock = false;
  }

  // ==============================
  // 3) EI 고안·직능: 직접입력 토글
  // ==============================
  function refreshEiExtraUi(){
    const isCustom = els.eiExtra.value === "custom";
    els.eiExtraCustomWrap.classList.toggle("hide", !isCustom);
    if (isCustom){
      // 비어있으면 기본값 넣어주기
      if (!els.eiExtraCustom.value.trim()){
        els.eiExtraCustom.value = "0.85";
      }
    }
  }

  function getEiExtraDecimal(){
    if (els.eiExtra.value === "custom"){
      return numOr0(parsePercent(els.eiExtraCustom.value));
    }
    return Number(els.eiExtra.value || 0);
  }

  // ==============================
  // 4) 프리셋/커스텀 저장
  // ==============================
  function captureRates(){
    return {
      nps: els.rateNps.value,
      hi: els.rateHi.value,
      ltcOfHi: els.rateLtcOfHi.value,
      ltcSalary: els.rateLtcSalary.value,
      eiEmp: els.rateEiEmp.value,
      eiEr: els.rateEiEr.value,
      eiExtraSelect: els.eiExtra.value,
      eiExtraCustom: els.eiExtraCustom.value,
      wcDefault: els.wcDefault.value
    };
  }

  function applyRates(obj){
    if (!obj) return;
    els.rateNps.value = obj.nps ?? "";
    els.rateHi.value = obj.hi ?? "";
    els.rateLtcOfHi.value = obj.ltcOfHi ?? "";
    els.rateLtcSalary.value = obj.ltcSalary ?? "";
    els.rateEiEmp.value = obj.eiEmp ?? "";
    els.rateEiEr.value = obj.eiEr ?? "";
    els.eiExtra.value = obj.eiExtraSelect ?? "0.0085";
    els.eiExtraCustom.value = obj.eiExtraCustom ?? "0.85";
    els.wcDefault.value = obj.wcDefault ?? "0.966";
    refreshEiExtraUi();
    syncLtc("hi"); // 혹시 일관성 맞추기
  }

  let customSaved = null;

  function applyPresetYear(y){
    const p = PRESET[y];
    if (!p) return;

    els.rateNps.value = pctStr(p.npsPct, 4);
    els.rateHi.value = pctStr(p.hiPct, 4);
    els.rateLtcOfHi.value = pctStr(p.ltcOfHiPct, 4);
    syncLtc("hiRatio");

    els.rateEiEmp.value = pctStr(p.eiEmpPct, 4);
    els.rateEiEr.value = pctStr(p.eiErPct, 4);

    // 산재/고안직능은 별도(요청 기본 유지)
    els.wcDefault.value = els.wcDefault.value?.trim() ? els.wcDefault.value : "0.966";
    if (!els.eiExtra.value) els.eiExtra.value = "0.0085";
    refreshEiExtraUi();
  }

  // ==============================
  // 5) 시트 생성(5명)
  // ==============================
  function buildSheet(){
    els.tbody.innerHTML = "";
    for (let r=0; r<N; r++){
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="center">${r+1}</td>
        <td class="left">
          <input class="cell-input name" data-cell="1" data-row="${r}" data-col="0" type="text" placeholder="선택" />
        </td>
        <td>
          <input class="cell-input" data-cell="1" data-row="${r}" data-col="1" type="text" inputmode="numeric" placeholder="예: 3,000,000" />
        </td>
        <td>
          <input class="cell-input" data-cell="1" data-row="${r}" data-col="2" type="text" inputmode="decimal" placeholder="(비우면 기본)" />
        </td>

        <td data-out="nps_e_${r}"></td>
        <td data-out="nps_er_${r}"></td>

        <td data-out="hi_e_${r}"></td>
        <td data-out="hi_er_${r}"></td>

        <td data-out="ltc_e_${r}"></td>
        <td data-out="ltc_er_${r}"></td>

        <td data-out="ei_e_${r}"></td>
        <td data-out="ei_er_${r}"></td>

        <td data-out="wc_er_${r}"></td>

        <td data-out="sum_emp_${r}"></td>
        <td data-out="sum_er_${r}"></td>
        <td data-out="sum_total_${r}"></td>
      `;
      els.tbody.appendChild(tr);
    }

    const inputs = [...document.querySelectorAll('input[data-cell="1"]')];
    for (const inp of inputs){
      const col = Number(inp.dataset.col);
      if (col === 1) setInputCommaOnBlur(inp, "won");
      if (col === 2) setInputCommaOnBlur(inp, "pct");
      inp.addEventListener("input", recalcAll);
    }

    bindKeyboardNav();
    bindPasteFill();
  }

  function getCellInput(row, col){
    return document.querySelector(`input[data-cell="1"][data-row="${row}"][data-col="${col}"]`);
  }

  // ==============================
  // 6) 키보드 네비게이션(엑셀 느낌)
  // ==============================
  function caretAtEdge(input, dir){
    try{
      const start = input.selectionStart ?? 0;
      const end = input.selectionEnd ?? 0;
      const len = (input.value ?? "").length;
      if (dir === "left") return start === 0 && end === 0;
      if (dir === "right") return start === len && end === len;
      return true;
    } catch {
      return true;
    }
  }

  function moveFocus(from, dr, dc){
    const r = Number(from.dataset.row);
    const c = Number(from.dataset.col);
    const nr = clamp(r + dr, 0, N-1);
    const nc = clamp(c + dc, 0, 2);
    const target = getCellInput(nr, nc);
    if (target){
      target.focus();
      target.select?.();
    }
  }

  function bindKeyboardNav(){
    const inputs = [...document.querySelectorAll('input[data-cell="1"]')];
    for (const inp of inputs){
      inp.addEventListener("keydown", (e) => {
        if (e.isComposing) return;

        if (e.key === "Enter"){
          e.preventDefault();
          moveFocus(inp, +1, 0);
          return;
        }
        if (e.key === "ArrowUp"){
          e.preventDefault();
          moveFocus(inp, -1, 0);
          return;
        }
        if (e.key === "ArrowDown"){
          e.preventDefault();
          moveFocus(inp, +1, 0);
          return;
        }
        if (e.key === "ArrowLeft"){
          if (caretAtEdge(inp, "left")) {
            e.preventDefault();
            moveFocus(inp, 0, -1);
          }
          return;
        }
        if (e.key === "ArrowRight"){
          if (caretAtEdge(inp, "right")) {
            e.preventDefault();
            moveFocus(inp, 0, +1);
          }
          return;
        }
      });
    }
  }

  // ==============================
  // 7) 붙여넣기(탭/줄바꿈)
  // ==============================
  function bindPasteFill(){
    const inputs = [...document.querySelectorAll('input[data-cell="1"]')];
    for (const inp of inputs){
      inp.addEventListener("paste", (e) => {
        const text = (e.clipboardData || window.clipboardData)?.getData("text");
        if (!text) return;
        if (!/[\t\r\n]/.test(text)) return;

        e.preventDefault();

        const startRow = Number(inp.dataset.row);
        const startCol = Number(inp.dataset.col);

        const rows = text
          .replace(/\r\n/g,"\n")
          .replace(/\r/g,"\n")
          .split("\n")
          .filter((x,idx,arr)=> !(idx===arr.length-1 && x===""));

        for (let r=0; r<rows.length; r++){
          const cols = rows[r].split("\t");
          for (let c=0; c<cols.length; c++){
            const rr = startRow + r;
            const cc = startCol + c;
            if (rr > N-1 || cc > 2) continue;
            const target = getCellInput(rr, cc);
            if (target) target.value = cols[c];
          }
        }
        recalcAll();
      });
    }
  }

  function getRates(){
    const nps = numOr0(parsePercent(els.rateNps.value));
    const hi  = numOr0(parsePercent(els.rateHi.value));
    const ltcOfHi = numOr0(parsePercent(els.rateLtcOfHi.value));
    const ltcSalary = hi * ltcOfHi; // decimal (보수 대비)
    const eiEmp = numOr0(parsePercent(els.rateEiEmp.value));
    const eiEr  = numOr0(parsePercent(els.rateEiEr.value));
    const eiExtra = numOr0(getEiExtraDecimal());
    const wcDefault = numOr0(parsePercent(els.wcDefault.value));

    return {
      nps, hi, ltcOfHi, ltcSalary, eiEmp, eiEr, eiExtra, wcDefault
    };
  }

      <div>건강보험: <code>${(r.hi*100).toFixed(4).replace(/\.?0+$/,"")}%</code> (근로자 ${(r.hi*50).toFixed(4).replace(/\.?0+$/,"")}% / 사업주 ${(r.hi*50).toFixed(4).replace(/\.?0+$/,"")}%)</div>
      <div>장기요양: <code>${(r.ltcOfHi*100).toFixed(4).replace(/\.?0+$/,"")}%</code> × 건강보험료 (보수 대비 <code>${ltcSalaryPct.toFixed(4).replace(/\.?0+$/,"")}%</code>)</div>
      <div>고용(실업급여): 근로자 <code>${(r.eiEmp*100).toFixed(4).replace(/\.?0+$/,"")}%</code> / 사업주 <code>${(r.eiEr*100).toFixed(4).replace(/\.?0+$/,"")}%</code> + 고안·직능(사업주) <code>${eiExtraPct.toFixed(4).replace(/\.?0+$/,"")}%</code></div>
      <div>산재(사업주): 기본 <code>${(r.wcDefault*100).toFixed(4).replace(/\.?0+$/,"")}%</code> (개인별 산재요율 칸으로 덮어쓰기 가능)</div>

  // ==============================
  // 9) 계산
  // ==============================
  function recalcAll(){
    refreshEiExtraUi();

    // 장기요양 연동(입력 도중 깨질 수 있으니)
    // - hi 바뀌면 total 갱신
    // - ratio 바뀌면 total 갱신
    // - total 바뀌면 ratio 갱신
    // 이 함수는 각 input 이벤트에서 호출되지만, 여기서도 한 번 더 안전하게 맞춰줌.
    // (락이 있어서 무한루프는 없음)
    syncLtc("hi");

    const rate = getRates();
    setRateSummary(rate);

    // 엑셀 다운로드용 rates 저장
    state.rates = {
      mode: els.year.value,
      npsPct: rate.nps*100,
      hiPct: rate.hi*100,
      ltcOfHiPct: rate.ltcOfHi*100,
      ltcSalaryPct: rate.ltcSalary*100,
      eiEmpPct: rate.eiEmp*100,
      eiErPct: rate.eiEr*100,
      eiExtraPct: rate.eiExtra*100,
      wcDefaultPct: rate.wcDefault*100
    };

    const wcDefault = rate.wcDefault;

    const sums = {
      nps_e:0, nps_er:0, hi_e:0, hi_er:0, ltc_e:0, ltc_er:0,
      ei_e:0, ei_er:0, wc_er:0, emp:0, er:0, total:0
    };

    for (let r=0; r<N; r++){
      const nameInp   = getCellInput(r, 0);
      const salaryInp = getCellInput(r, 1);
      const wcOverInp = getCellInput(r, 2);

      const name = (nameInp?.value ?? "").trim();
      const salary = parseWon(salaryInp?.value);
      const wcOver = parsePercent(wcOverInp?.value);
      const wcRate = isFinite(wcOver) ? wcOver : wcDefault;

      const valid = isFinite(salary) && salary > 0;

      // 국민연금
      const nps_e  = valid ? floor10(salary * (rate.nps/2)) : NaN;
      const nps_er = valid ? floor10(salary * (rate.nps/2)) : NaN;

      // 건강보험
      const hi_total = valid ? (salary * rate.hi) : NaN;
      const hi_e  = valid ? floor10(hi_total/2) : NaN;
      const hi_er = valid ? floor10(hi_total/2) : NaN;

      // 장기요양: 건강보험료 * (장기요양 비율)
      const ltc_total = valid ? (hi_total * rate.ltcOfHi) : NaN;
      const ltc_e  = valid ? floor10(ltc_total/2) : NaN;
      const ltc_er = valid ? floor10(ltc_total/2) : NaN;

      // 고용보험
      const ei_e  = valid ? floor10(salary * rate.eiEmp) : NaN;
      const ei_er = valid ? floor10(salary * (rate.eiEr + rate.eiExtra)) : NaN;

      // 산재(사업주)
      const wc_er = valid ? floor10(salary * wcRate) : NaN;

      // 합계
      const empSum = valid ? (nps_e + hi_e + ltc_e + ei_e) : NaN;
      const erSum  = valid ? (nps_er + hi_er + ltc_er + ei_er + wc_er) : NaN;
      const total  = valid ? (empSum + erSum) : NaN;

      // 화면 출력
      const out = (key, val) => {
        const td = document.querySelector(`[data-out="${key}_${r}"]`);
        if (!td) return;
        td.textContent = isFinite(val) ? fmtWon(val) : "";
      };

      out("nps_e", nps_e);   out("nps_er", nps_er);
      out("hi_e", hi_e);     out("hi_er", hi_er);
      out("ltc_e", ltc_e);   out("ltc_er", ltc_er);
      out("ei_e", ei_e);     out("ei_er", ei_er);
      out("wc_er", wc_er);
      out("sum_emp", empSum);
      out("sum_er", erSum);
      out("sum_total", total);

      // 합계 누적
      function add(field, v){ if (isFinite(v)) sums[field] += v; }
      add("nps_e", nps_e); add("nps_er", nps_er);
      add("hi_e", hi_e); add("hi_er", hi_er);
      add("ltc_e", ltc_e); add("ltc_er", ltc_er);
      add("ei_e", ei_e); add("ei_er", ei_er);
      add("wc_er", wc_er);
      add("emp", empSum); add("er", erSum); add("total", total);

      // state 저장(엑셀용)
      state.rows[r] = {
        no: r+1,
        name,
        salary: valid ? salary : NaN,
        wcPct: (isFinite(wcOver) ? (wcOver*100) : (wcDefault*100)),
        nps_e, nps_er, hi_e, hi_er, ltc_e, ltc_er, ei_e, ei_er, wc_er,
        sum_emp: empSum, sum_er: erSum, sum_total: total
      };
    }

    // 하단 합계 행 업데이트
    sumIds.sum_nps_e.textContent  = fmtWon(sums.nps_e);
    sumIds.sum_nps_er.textContent = fmtWon(sums.nps_er);
    sumIds.sum_hi_e.textContent   = fmtWon(sums.hi_e);
    sumIds.sum_hi_er.textContent  = fmtWon(sums.hi_er);
    sumIds.sum_ltc_e.textContent  = fmtWon(sums.ltc_e);
    sumIds.sum_ltc_er.textContent = fmtWon(sums.ltc_er);
    sumIds.sum_ei_e.textContent   = fmtWon(sums.ei_e);
    sumIds.sum_ei_er.textContent  = fmtWon(sums.ei_er);
    sumIds.sum_wc_er.textContent  = fmtWon(sums.wc_er);
    sumIds.sum_emp.textContent    = fmtWon(sums.emp);
    sumIds.sum_er.textContent     = fmtWon(sums.er);
    sumIds.sum_total.textContent  = fmtWon(sums.total);

    state.sums = {...sums};

    // 커스텀 모드면 커스텀값 저장
    if (els.year.value === "custom"){
      customSaved = captureRates();
    }
  }

  function xmlEscape(s){
    return (s ?? "").toString()
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&apos;");
  }

  function cellXml(value, type, styleId){
    const st = styleId ? ` ss:StyleID="${styleId}"` : "";
    if (value === "" || value === null || typeof value === "undefined" || (type==="Number" && !isFinite(value))){
      return `<Cell${st}><Data ss:Type="String"></Data></Cell>`;
    }
    if (type === "Number"){
      return `<Cell${st}><Data ss:Type="Number">${value}</Data></Cell>`;
    }
    return `<Cell${st}><Data ss:Type="String">${xmlEscape(value)}</Data></Cell>`;
  }

  function downloadExcel(){
    recalcAll();
    const xml = buildExcelXml();
    const blob = new Blob([xml], {type: "application/vnd.ms-excel;charset=utf-8"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    const modeLabel = (els.year.value === "custom") ? "직접입력" : els.year.value;
    a.href = url;
    a.download = `사회보험료_계산결과_${modeLabel}.xls`;
    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ==============================

  function bindRateInputs(){
    const pctInputs = [
      els.rateNps, els.rateHi, els.rateLtcOfHi, els.rateLtcSalary,
      els.rateEiEmp, els.rateEiEr, els.eiExtraCustom, els.wcDefault
    ];
    for (const el of pctInputs) setInputCommaOnBlur(el, "pct");

    // 개별 입력 이벤트
    els.rateHi.addEventListener("input", () => { syncLtc("hi"); recalcAll(); });
    els.rateLtcOfHi.addEventListener("input", () => { syncLtc("hiRatio"); recalcAll(); });
    els.rateLtcSalary.addEventListener("input", () => { syncLtc("salary"); recalcAll(); });

    [els.rateNps, els.rateEiEmp, els.rateEiEr, els.wcDefault].forEach(el => {
      el.addEventListener("input", recalcAll);
    });

    els.eiExtra.addEventListener("change", () => {
      // 직접입력으로 바꾸면 현재 선택값을 custom 입력에 옮겨주기
      if (els.eiExtra.value === "custom"){
        // 직전 값이 숫자였다면 그걸 %로
        const prev = Number(els.eiExtra.dataset.prev || 0.0085);
        els.eiExtraCustom.value = Number((prev*100).toFixed(4)).toString();
      }
      recalcAll();
    });

    els.eiExtra.addEventListener("change", refreshEiExtraUi);
    els.eiExtraCustom.addEventListener("input", recalcAll);

    // prev tracking
    els.eiExtra.addEventListener("change", () => {
      if (els.eiExtra.value !== "custom"){
        els.eiExtra.dataset.prev = els.eiExtra.value;
      }
    });
  }

  // 연도 선택
  els.year.addEventListener("change", () => {
    const v = els.year.value;

    if (v === "custom"){
      if (customSaved) applyRates(customSaved);
      refreshEiExtraUi();
      recalcAll();
      return;
    }

    // 프리셋 선택 시: 현재 커스텀을 저장해두면 왔다갔다 편함
    if (!customSaved) customSaved = captureRates();

    applyPresetYear(v);
    recalcAll();
  });

    for (let r=0; r<N; r++){
      getCellInput(r,0).value = demo[r][0];
      getCellInput(r,1).value = demo[r][1];
      getCellInput(r,2).value = demo[r][2];
    }
    recalcAll();
  });

  els.btnDownloadXls.addEventListener("click", downloadExcel);

  // ==============================
  // 12) 초기화
  // ==============================
  function init(){
    buildSheet();
    bindRateInputs();

    // EI 커스텀 입력칸 기본 숨김(선택값이 0.85%라서)
    refreshEiExtraUi();

    // 기본 연도: 2026 프리셋 적용
    applyPresetYear("2026");
    els.year.value = "2026";

    recalcAll();
    getCellInput(0,0)?.focus();
  }

  init();
})();
