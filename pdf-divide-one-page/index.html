<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF 여러장 → 1페이지씩 분리 저장</title>

  <link rel="icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/style.css" />

</head>

<body>
  <header class="site-header">
    <div class="shell">
      <h1>PDF 여러장 → 1페이지씩 분리 저장</h1>
      <p class="muted">
        ·PDF파일 업로드하면 1페이지씩 분리해서 개별 PDF파일로 저장해줌
      </p>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2>1. PDF 파일 선택</h2>

      <div class="grid two">
        <div class="field">
          <div class="muted local-small">PDF 파일</div>
          <input id="file" type="file" accept="application/pdf" />
          <p id="fileInfo" class="muted local-small" style="margin-top:8px;"></p>
        </div>

        <div class="field">
          <div class="muted local-small">파일명 접두어(선택)</div>
          <input id="prefix" type="text" placeholder="비우면 원본 파일명 사용" />
          <p class="muted">
            예: <code>보고서</code> → <code>보고서_p001.pdf</code>, <code>보고서_p002.pdf</code> …
          </p>
        </div>
      </div>

      <div class="grid three" style="margin-top:10px;">
        <div class="field">
          <div class="muted local-small">시작 페이지</div>
          <input id="startPage" type="number" min="1" value="1" />
        </div>

        <div class="field">
          <div class="muted local-small">끝 페이지</div>
          <input id="endPage" type="number" min="1" placeholder="자동(총페이지)" />
        </div>

        <div class="field">
          <div class="muted local-small">페이지번호 자리수(선택)</div>
          <input id="padDigits" type="number" min="1" placeholder="자동(예: 001)" />
        </div>
      </div>

      <div class="row gap" style="margin-top:14px;">
        <button id="btnSplit" class="btn primary" type="button" disabled>분리하기</button>
        <button id="btnReset" class="btn pastel-grey" type="button">초기화</button>
      </div>

      <div class="card" style="margin-top:14px;">
        <div class="row between">
          <div>
            <strong>상태:</strong> <span id="status">대기</span>
          </div>
          <div id="progressText" class="muted local-small"></div>
        </div>
        <div style="margin-top:10px;">
          <progress id="progress" value="0" max="100" style="width:100%;"></progress>
        </div>
        <p class="muted local-small" style="margin-top:10px;">
          참고: 브라우저는 “자동 다중 다운로드”를 제한할 수 있어요. 그럴 땐 아래의 <strong>ZIP</strong> 또는 <strong>폴더 저장</strong> 옵션이 편합니다.
        </p>
      </div>
    </section>

    <section id="resultsSection" class="section" hidden>
      <h2>2) 결과</h2>

      <div class="row gap">
        <button id="btnZip" class="btn pastel-green" type="button" disabled>ZIP로 한 번에 다운로드</button>
        <button id="btnDir" class="btn pastel-teal" type="button" disabled>폴더에 한 번에 저장(Chrome/Edge)</button>
        <button id="btnDownloadAll" class="btn pastel-blue" type="button" disabled>전체 순차 다운로드</button>
        <button id="btnClearResults" class="btn pastel-grey" type="button" disabled>결과 지우기</button>
      </div>

      <p id="summary" class="muted" style="margin-top:10px;"></p>

      <div id="results" class="grid two" style="margin-top:10px;"></div>
    </section>
  </main>

  <!-- pdf-lib (PDF 분리 생성) -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- JSZip (ZIP 다운로드 옵션) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>
    (function () {
      const $ = (sel) => document.querySelector(sel);

      const elFile = $("#file");
      const elFileInfo = $("#fileInfo");
      const elPrefix = $("#prefix");
      const elStart = $("#startPage");
      const elEnd = $("#endPage");
      const elPad = $("#padDigits");

      const elBtnSplit = $("#btnSplit");
      const elBtnReset = $("#btnReset");

      const elStatus = $("#status");
      const elProgress = $("#progress");
      const elProgressText = $("#progressText");

      const elResultsSection = $("#resultsSection");
      const elSummary = $("#summary");
      const elResults = $("#results");

      const elBtnZip = $("#btnZip");
      const elBtnDir = $("#btnDir");
      const elBtnDownloadAll = $("#btnDownloadAll");
      const elBtnClearResults = $("#btnClearResults");

      const state = {
        file: null,
        pdfDoc: null,
        pageCount: 0,
        results: [], // { page, filename, blob, url }
        busy: false,
      };

      function setBusy(v) {
        state.busy = v;
        elBtnSplit.disabled = v || !state.pdfDoc;
        elBtnZip.disabled = v || state.results.length === 0;
        elBtnDir.disabled = v || state.results.length === 0;
        elBtnDownloadAll.disabled = v || state.results.length === 0;
        elBtnClearResults.disabled = v || state.results.length === 0;
        elFile.disabled = v;
        elPrefix.disabled = v;
        elStart.disabled = v;
        elEnd.disabled = v;
        elPad.disabled = v;
      }

      function setStatus(text) {
        elStatus.textContent = text;
      }

      function setProgress(done, total) {
        if (!total || total <= 0) {
          elProgress.value = 0;
          elProgress.max = 100;
          elProgressText.textContent = "";
          return;
        }
        elProgress.max = total;
        elProgress.value = done;
        elProgressText.textContent = `${done} / ${total}`;
      }

      function humanBytes(bytes) {
        const n = Number(bytes) || 0;
        const units = ["B", "KB", "MB", "GB"];
        let v = n, i = 0;
        while (v >= 1024 && i < units.length - 1) {
          v = v / 1024;
          i++;
        }
        const fixed = (i === 0) ? 0 : (v < 10 ? 2 : (v < 100 ? 1 : 0));
        return `${v.toFixed(fixed)} ${units[i]}`;
      }

      function baseName(filename) {
        const n = (filename || "").replace(/\\/g, "/").split("/").pop();
        return n.replace(/\.[^.]+$/, "") || "pdf";
      }

      function sanitizeFileName(name) {
        // Windows/브라우저 다운로드에서 문제될 만한 문자 제거/치환
        return (name || "pdf")
          .trim()
          .replace(/[<>:"/\\|?*\u0000-\u001F]/g, "_")
          .replace(/\s+/g, " ")
          .replace(/\.+$/g, "")
          .slice(0, 120) || "pdf";
      }

      function clamp(n, min, max) {
        const x = Number(n);
        if (!Number.isFinite(x)) return min;
        return Math.min(max, Math.max(min, Math.trunc(x)));
      }

      function padNum(n, digits) {
        const s = String(n);
        return s.length >= digits ? s : ("0".repeat(digits - s.length) + s);
      }

      function clearResults() {
        // objectURL 정리
        for (const r of state.results) {
          try { URL.revokeObjectURL(r.url); } catch (_) {}
        }
        state.results = [];
        elResults.innerHTML = "";
        elSummary.textContent = "";
        elResultsSection.hidden = true;
        setProgress(0, 0);
        setBusy(false);
      }

      function fullReset() {
        clearResults();
        state.file = null;
        state.pdfDoc = null;
        state.pageCount = 0;

        elFile.value = "";
        elPrefix.value = "";
        elStart.value = "1";
        elEnd.value = "";
        elPad.value = "";

        elFileInfo.textContent = "";
        setStatus("대기");
        elBtnSplit.disabled = true;
      }

      function renderResults() {
        elResults.innerHTML = "";
        const frag = document.createDocumentFragment();

        for (const r of state.results) {
          const card = document.createElement("div");
          card.className = "card";

          const top = document.createElement("div");
          top.className = "row between";

          const left = document.createElement("div");
          left.innerHTML = `<strong>${r.page}페이지</strong><div class="muted local-small">${r.filename}</div>`;

          const right = document.createElement("div");
          right.className = "row gap";

          const size = document.createElement("span");
          size.className = "muted local-small";
          size.textContent = humanBytes(r.blob.size);

          const a = document.createElement("a");
          a.className = "btn pastel-blue";
          a.href = r.url;
          a.download = r.filename;
          a.textContent = "다운로드";

          right.appendChild(size);
          right.appendChild(a);

          top.appendChild(left);
          top.appendChild(right);
          card.appendChild(top);

          frag.appendChild(card);
        }

        elResults.appendChild(frag);

        elResultsSection.hidden = false;
        elSummary.textContent =
          `총 ${state.results.length}개 파일 생성 완료 · (원본: ${state.pageCount}페이지)`;
      }

      async function idle() {
        // UI가 멈춘 것처럼 보이지 않게 한 박자 양보
        await new Promise(requestAnimationFrame);
      }

      async function loadPdfFromFile(file) {
        const { PDFDocument } = window.PDFLib || {};
        if (!PDFDocument) throw new Error("pdf-lib 로드 실패");

        setStatus("PDF 읽는 중…");
        setProgress(0, 0);

        const bytes = await file.arrayBuffer();
        const doc = await PDFDocument.load(bytes); // 암호 걸린 PDF면 여기서 에러
        return doc;
      }

      async function handleFileSelect() {
        clearResults();

        const file = elFile.files && elFile.files[0];
        if (!file) {
          fullReset();
          return;
        }

        state.file = file;
        elFileInfo.textContent = `${file.name} · ${humanBytes(file.size)}`;

        // 접두어 기본값(빈 값이면 원본파일명으로 처리하지만, UI에 힌트로 넣어둠)
        if (!elPrefix.value.trim()) {
          elPrefix.value = baseName(file.name);
        }

        setBusy(true);

        try {
          state.pdfDoc = await loadPdfFromFile(file);
          state.pageCount = state.pdfDoc.getPageCount();

          // 끝페이지 기본값 자동 세팅
          elEnd.value = String(state.pageCount);

          setStatus(`준비 완료 (총 ${state.pageCount}페이지)`);
          elBtnSplit.disabled = false;
        } catch (err) {
          console.error(err);
          state.pdfDoc = null;
          state.pageCount = 0;
          setStatus("PDF 읽기 실패");
          elFileInfo.textContent =
            `${file.name} · ${humanBytes(file.size)} · (열 수 없는 PDF일 수 있어요: 암호/손상 등)`;
          elBtnSplit.disabled = true;
        } finally {
          setBusy(false);
        }
      }

      async function splitPdf() {
        if (!state.pdfDoc || !state.file) return;

        clearResults();
        setBusy(true);

        const { PDFDocument } = window.PDFLib;

        try {
          const totalPages = state.pageCount;

          let s = clamp(elStart.value || 1, 1, totalPages);
          let e = clamp(elEnd.value || totalPages, 1, totalPages);
          if (s > e) [s, e] = [e, s];

          const prefix = sanitizeFileName(elPrefix.value.trim() || baseName(state.file.name));

          const userPad = Number(elPad.value);
          const padDigits = (Number.isFinite(userPad) && userPad > 0)
            ? Math.trunc(userPad)
            : String(e).length; // 끝페이지 자릿수 기준 자동(예: 120페이지면 3자리)

          const count = (e - s + 1);
          setStatus("분리 작업 시작…");
          setProgress(0, count);

          for (let p = s; p <= e; p++) {
            setStatus(`페이지 분리 중… (${p}/${e})`);
            setProgress(p - s, count);

            const newDoc = await PDFDocument.create();
            const [copied] = await newDoc.copyPages(state.pdfDoc, [p - 1]);
            newDoc.addPage(copied);

            const bytes = await newDoc.save();
            const blob = new Blob([bytes], { type: "application/pdf" });
            const filename = `${prefix}_p${padNum(p, padDigits)}.pdf`;
            const url = URL.createObjectURL(blob);

            state.results.push({ page: p, filename, blob, url });

            // UI 갱신
            if ((p - s) % 2 === 0) await idle();
          }

          setProgress(count, count);
          setStatus("완료 ✅");

          renderResults();

          // 버튼 활성화
          elBtnZip.disabled = false;
          elBtnDir.disabled = false;
          elBtnDownloadAll.disabled = false;
          elBtnClearResults.disabled = false;

          // 폴더 저장 버튼은 지원 브라우저에서만
          if (!("showDirectoryPicker" in window)) {
            elBtnDir.disabled = true;
            elBtnDir.title = "이 브라우저는 폴더 저장(File System Access API)을 지원하지 않습니다.";
          } else {
            elBtnDir.title = "";
          }

        } catch (err) {
          console.error(err);
          setStatus("실패 ❌");
          elSummary.textContent = "분리 중 오류가 발생했습니다. (암호 PDF/손상/메모리 부족 등)";
        } finally {
          setBusy(false);
        }
      }

      async function downloadAllSequential() {
        if (state.results.length === 0) return;
        setBusy(true);

        try {
          setStatus("전체 순차 다운로드 시작…");
          // 사용자 클릭(제스처)로 시작했어도 브라우저가 막을 수 있음
          for (let i = 0; i < state.results.length; i++) {
            const r = state.results[i];
            setStatus(`다운로드 트리거… (${i + 1}/${state.results.length})`);
            setProgress(i + 1, state.results.length);

            const a = document.createElement("a");
            a.href = r.url;
            a.download = r.filename;
            document.body.appendChild(a);
            a.click();
            a.remove();

            // 너무 빠르면 일부 브라우저가 누락시킬 수 있어 약간 딜레이
            await new Promise(res => setTimeout(res, 180));
          }

          setStatus("전체 다운로드 트리거 완료 ✅");
        } catch (e) {
          console.error(e);
          setStatus("전체 다운로드 실패 ❌");
        } finally {
          setBusy(false);
          setProgress(0, 0);
        }
      }

      async function downloadZip() {
        if (state.results.length === 0) return;

        setBusy(true);

        try {
          setStatus("ZIP 생성 중…");
          setProgress(0, state.results.length);

          const zip = new JSZip();
          for (let i = 0; i < state.results.length; i++) {
            const r = state.results[i];
            zip.file(r.filename, r.blob);
            setProgress(i + 1, state.results.length);
            if (i % 3 === 0) await idle();
          }

          const zipBlob = await zip.generateAsync({ type: "blob" });

          const prefix = sanitizeFileName(elPrefix.value.trim() || baseName(state.file.name));
          const zipName = `${prefix}_pages.zip`;

          const url = URL.createObjectURL(zipBlob);
          const a = document.createElement("a");
          a.href = url;
          a.download = zipName;
          document.body.appendChild(a);
          a.click();
          a.remove();

          // ZIP URL은 잠시 후 해제
          setTimeout(() => {
            try { URL.revokeObjectURL(url); } catch (_) {}
          }, 10_000);

          setStatus("ZIP 다운로드 준비 완료 ✅");
        } catch (e) {
          console.error(e);
          setStatus("ZIP 생성 실패 ❌");
        } finally {
          setBusy(false);
          setProgress(0, 0);
        }
      }

      async function saveToDirectory() {
        if (state.results.length === 0) return;
        if (!("showDirectoryPicker" in window)) return;

        setBusy(true);

        try {
          setStatus("폴더 선택 대기…");
          const dir = await window.showDirectoryPicker();
          setStatus("폴더에 저장 중…");
          setProgress(0, state.results.length);

          for (let i = 0; i < state.results.length; i++) {
            const r = state.results[i];
            const fh = await dir.getFileHandle(r.filename, { create: true });
            const writable = await fh.createWritable();
            await writable.write(r.blob);
            await writable.close();

            setProgress(i + 1, state.results.length);
            if (i % 2 === 0) await idle();
          }

          setStatus("폴더 저장 완료 ✅");
        } catch (e) {
          console.error(e);
          setStatus("폴더 저장 실패/취소 ❌");
        } finally {
          setBusy(false);
          setProgress(0, 0);
        }
      }

      // 이벤트 바인딩
      elFile.addEventListener("change", handleFileSelect);
      elBtnSplit.addEventListener("click", splitPdf);
      elBtnReset.addEventListener("click", fullReset);
      elBtnClearResults.addEventListener("click", clearResults);
      elBtnZip.addEventListener("click", downloadZip);
      elBtnDir.addEventListener("click", saveToDirectory);
      elBtnDownloadAll.addEventListener("click", downloadAllSequential);

      // 초기 상태
      fullReset();
    })();
  </script>

<script src="/static/disable-copy.js"></script>
<script src="/static/footer.js"></script>
<script src="/static/global-loader.js?v=1"></script>
</body>
</html>
